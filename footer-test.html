<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footer Preview</title>
<style>
:root { --primary: #4caf50; --primary-dark: #388e3c; }
</style>
<link rel="stylesheet" href="http://localhost:8765/wp-content/themes/eurofert-theme/css/footer.css">
<style>
body { margin: 0; background: #fff; }
.social-link { color: white; font-size: 1.2rem; font-weight: bold; }
</style>
</head>
<body>
<footer class="footer">
  <div class="footer-container">
    <div class="footer-lower">
      <div class="footer-copyright-col">
        <p class="copyright-text text-muted">
          <strong>&copy; 2025 Eurofert. All rights reserved.</strong>
        </p>
      </div>
      <div class="footer-legal-col">
        <ul class="footer-legal-list">
          <li><a href="#" class="footer-legal-link text-muted" style="color:rgba(255,255,255,0.72)">Privacy Policy</a></li>
          <li><a href="#" class="footer-legal-link text-muted" style="color:rgba(255,255,255,0.72)">Terms of Service</a></li>
          <li><a href="#" class="footer-legal-link text-muted" style="color:rgba(255,255,255,0.72)">Cookie Policy</a></li>
        </ul>
      </div>
      <div class="footer-social-col">
        <div class="footer-social-wrapper">
          <a href="#" class="social-link" aria-label="Facebook" style="color:white">F</a>
          <a href="#" class="social-link" aria-label="Twitter" style="color:white">T</a>
          <a href="#" class="social-link" aria-label="LinkedIn" style="color:white">L</a>
          <a href="#" class="social-link" aria-label="Instagram" style="color:white">I</a>
        </div>
      </div>
    </div>
  </div>
</footer>
</body>
</html>
